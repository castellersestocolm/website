global
  log /dev/log    local0
  log /dev/log    local1 notice
  maxconn 4096

defaults
  log global
  mode http
  option httplog
  option dontlognull
  timeout client 10s
  timeout connect 5s
  timeout server 10s
  timeout http-request 10s
  default-server init-addr last,libc,none

resolvers docker
  parse-resolv-conf

frontend backend_org_balancer
  bind 0.0.0.0:8081
  mode http
  default_backend backend_org_apis

backend backend_org_apis
  mode http
  balance roundrobin
  option forwardfor
  server-template backend_org- 1 comunicat_backend-org:8000 check init-state fully-down resolvers docker init-addr libc,none

frontend backend_towers_balancer
  bind 0.0.0.0:8082
  mode http
  default_backend backend_towers_apis

backend backend_towers_apis
  mode http
  balance roundrobin
  option forwardfor
  server-template backend_towers- 1 comunicat_backend-towers:8000 check init-state fully-down resolvers docker init-addr libc,none

frontend frontend_towers_balancer
  bind 0.0.0.0:3210
  mode http
  default_backend frontend_towers_apps

backend frontend_towers_apps
  mode http
  balance roundrobin
  option forwardfor
  server-template frontend_towers- 2 comunicat_frontend-towers:80 init-state fully-down check resolvers docker init-addr libc,none

frontend frontend_org_balancer
  bind 0.0.0.0:3200
  mode http
  default_backend frontend_org_apps

backend frontend_org_apps
  mode http
  balance roundrobin
  option forwardfor
  server-template frontend_org- 2 comunicat_frontend-org:80 init-state fully-down check resolvers docker init-addr libc,none
