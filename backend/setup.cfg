[flake8]
max-line-length = 88
ignore = E501,E121,E122,E123,E126,E731,W503
exclude = .git,migrations,manage.py
show-source = true
max-complexity = 10

[isort]
line_length = 88
known_first_party = src/
default_section = THIRDPARTY
multi_line_output = 3
combine_as_imports = true
include_trailing_comma = true
force_grid_wrap = 0
skip = migrations

[coverage:report]
relative_files = true
omit =
    */migrations/*
